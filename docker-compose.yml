services:
  db:
    image: postgres:16
    container_name: meal-share-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mealshare
      POSTGRES_PASSWORD: mealshare
      POSTGRES_DB: mealshare
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealshare"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
